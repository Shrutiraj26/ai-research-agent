<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Research Agent</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: 'Segoe UI', sans-serif; background: #0f172a; color: #e2e8f0; min-height: 100vh; display: flex; flex-direction: column; }
        header { background: #1e293b; padding: 20px 40px; border-bottom: 1px solid #334155; }
        header h1 { font-size: 1.5rem; color: #38bdf8; }
        header p { font-size: 0.85rem; color: #94a3b8; margin-top: 4px; }
        .tools-bar { display: flex; gap: 10px; padding: 12px 40px; background: #1e293b; border-bottom: 1px solid #334155; }
        .tool-badge { background: #0f172a; border: 1px solid #334155; padding: 4px 12px; border-radius: 20px; font-size: 0.75rem; color: #38bdf8; }
        .chat-container { flex: 1; overflow-y: auto; padding: 30px 40px; display: flex; flex-direction: column; gap: 20px; max-width: 860px; width: 100%; margin: 0 auto; }
        .message { display: flex; gap: 12px; align-items: flex-start; }
        .avatar { width: 36px; height: 36px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 1rem; flex-shrink: 0; }
        .user .avatar { background: #3b82f6; }
        .agent .avatar { background: #0ea5e9; }
        .bubble { background: #1e293b; border: 1px solid #334155; border-radius: 12px; padding: 14px 18px; font-size: 0.92rem; line-height: 1.6; max-width: 720px; }
        .user .bubble { background: #1d4ed8; border-color: #2563eb; }
        .thinking { display: flex; gap: 5px; align-items: center; padding: 14px 18px; }
        .dot { width: 8px; height: 8px; background: #38bdf8; border-radius: 50%; animation: bounce 1.2s infinite; }
        .dot:nth-child(2) { animation-delay: 0.2s; }
        .dot:nth-child(3) { animation-delay: 0.4s; }
        @keyframes bounce { 0%, 80%, 100% { transform: translateY(0); } 40% { transform: translateY(-8px); } }
        .input-area { background: #1e293b; border-top: 1px solid #334155; padding: 20px 40px; }
        .input-wrap { max-width: 860px; margin: 0 auto; display: flex; gap: 12px; }
        .input-wrap input { flex: 1; background: #0f172a; border: 1px solid #334155; border-radius: 10px; padding: 12px 16px; color: #e2e8f0; font-size: 0.95rem; outline: none; transition: border 0.2s; }
        .input-wrap input:focus { border-color: #38bdf8; }
        .input-wrap button { background: #0ea5e9; border: none; border-radius: 10px; padding: 12px 24px; color: white; font-size: 0.95rem; font-weight: 600; cursor: pointer; transition: background 0.2s; }
        .input-wrap button:hover { background: #0284c7; }
        .input-wrap button:disabled { background: #334155; cursor: not-allowed; }
        .suggestions { max-width: 860px; margin: 0 auto 12px; display: flex; flex-wrap: wrap; gap: 8px; }
        .suggestion { background: #1e293b; border: 1px solid #334155; border-radius: 8px; padding: 6px 14px; font-size: 0.8rem; color: #94a3b8; cursor: pointer; transition: all 0.2s; }
        .suggestion:hover { border-color: #38bdf8; color: #38bdf8; }
    </style>
</head>
<body>
    <header>
        <h1>AI Research Agent</h1>
        <p>Powered by LLaMA 3.1 + Groq — searches the web, Wikipedia, and does calculations in real time</p>
    </header>
    <div class="tools-bar">
        <span class="tool-badge">Web Search</span>
        <span class="tool-badge">Wikipedia</span>
        <span class="tool-badge">Calculator</span>
    </div>

    <div class="chat-container" id="chat"></div>

    <div class="input-area">
        <div class="suggestions" id="suggestions">
            <span class="suggestion" onclick="usesuggestion(this)">What is LangChain?</span>
            <span class="suggestion" onclick="usesuggestion(this)">Latest AI news today</span>
            <span class="suggestion" onclick="usesuggestion(this)">What is 235 * 48?</span>
            <span class="suggestion" onclick="usesuggestion(this)">Who is Elon Musk?</span>
        </div>
        <div class="input-wrap">
            <input type="text" id="question" placeholder="Ask me anything..." onkeydown="if(event.key==='Enter') ask()">
            <button id="askBtn" onclick="ask()">Ask</button>
        </div>
    </div>

    <script>
        function usesuggestion(el) {
            document.getElementById('question').value = el.textContent;
            document.getElementById('question').focus();
        }

        function addMessage(role, text) {
            const chat = document.getElementById('chat');
            const div = document.createElement('div');
            div.className = `message ${role}`;
            div.innerHTML = `
                <div class="avatar">${role === 'user' ? '👤' : '🤖'}</div>
                <div class="bubble">${text.replace(/\n/g, '<br>')}</div>`;
            chat.appendChild(div);
            chat.scrollTop = chat.scrollHeight;
            return div;
        }

        function addThinking() {
            const chat = document.getElementById('chat');
            const div = document.createElement('div');
            div.className = 'message agent';
            div.id = 'thinking';
            div.innerHTML = `<div class="avatar">🤖</div><div class="bubble thinking"><div class="dot"></div><div class="dot"></div><div class="dot"></div></div>`;
            chat.appendChild(div);
            chat.scrollTop = chat.scrollHeight;
        }

        async function ask() {
            const input = document.getElementById('question');
            const btn = document.getElementById('askBtn');
            const question = input.value.trim();
            if (!question) return;

            document.getElementById('suggestions').style.display = 'none';
            addMessage('user', question);
            input.value = '';
            btn.disabled = true;
            addThinking();

            try {
                const res = await fetch('/ask', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ question })
                });
                const data = await res.json();
                document.getElementById('thinking')?.remove();
                addMessage('agent', data.answer || data.error);
            } catch (e) {
                document.getElementById('thinking')?.remove();
                addMessage('agent', 'Something went wrong. Please try again.');
            }
            btn.disabled = false;
            input.focus();
        }
    </script>
</body>
</html>
